<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Country Data Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        table { border-collapse: collapse; width: 60%; margin-bottom: 2em; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #f2f2f2; }
        img { max-width: 90vw; height: auto; margin-bottom: 2em; border: 1px solid #ddd; box-shadow: 2px 2px 8px #eee; }
    </style>
</head>
<body>
    <h1>Country Data Visualization</h1>
    <h2>Scraped Country Data</h2>
    <table>
        <tr>
            <th>Country</th>
            <th>Population</th>
            <th>Area (sq km)</th>
        </tr>
        {% for name, pop, area in country_data %}
        <tr>
            <td>{{ name }}</td>
            <td>{{ "{:,}".format(pop) }}</td>
            <td>{{ "{:,}".format(area) }}</td>
        </tr>
        {% endfor %}
    </table>
    <h2>Visualizations (Matplotlib)</h2>
    {% for img in plot_images %}
        <img src="data:image/png;base64,{{ img }}" alt="Country Plot">
    {% endfor %}
</body>
</html>
